<!doctype html>
<html lang="en">
  <head>
    <script>
      // Fixes "Cannot set property fetch of #<Window> which has only a getter" in secure sandboxed preview environments
      (function() {
        try {
          const originalGlobalThis = window.globalThis || window;
          const originalFetch = window.fetch;
          let currentFetch = originalFetch;
          
          const descriptor = {
            get() {
              return currentFetch;
            },
            set(v) {
              currentFetch = v;
            },
            configurable: true,
            enumerable: true
          };

          // 1. Redefine fetch with a getter-setter pair on Window.prototype so that direct assignments to window.fetch succeed
          if (window.Window && Window.prototype) {
            try {
              Object.defineProperty(Window.prototype, 'fetch', descriptor);
            } catch (e) {
              console.warn('Failed to define fetch on Window.prototype:', e);
            }
          }

          // 2. Also try to define it on window directly as fallback or shadow
          try {
            Object.defineProperty(window, 'fetch', descriptor);
          } catch (e) {
            console.warn('Failed to define fetch directly on window:', e);
          }

          let proxy;
          const proxyHandler = {
            get(target, prop) {
              if (prop === 'fetch') {
                return currentFetch;
              }
              if (prop === 'globalThis' || prop === 'global' || prop === 'self' || prop === 'window') {
                return proxy;
              }
              const val = target[prop];
              if (typeof val === 'function') {
                // Binding native methods to the original target avoids "Illegal invocation" errors
                return val.bind(target);
              }
              return val;
            },
            set(target, prop, value) {
              if (prop === 'fetch') {
                currentFetch = value;
                return true;
              }
              target[prop] = value;
              return true;
            },
            has(target, prop) {
              return prop in target;
            },
            getOwnPropertyDescriptor(target, prop) {
              if (prop === 'fetch') {
                return {
                  get() { return currentFetch; },
                  set(v) { currentFetch = v; },
                  configurable: true,
                  enumerable: true
                };
              }
              return Reflect.getOwnPropertyDescriptor(target, prop);
            }
          };

          proxy = new Proxy(originalGlobalThis, proxyHandler);

          // Expose proxy to handle global scopes transparently
          Object.defineProperty(window, 'globalThis', {
            value: proxy,
            configurable: true,
            writable: true,
            enumerable: true
          });

          Object.defineProperty(window, 'global', {
            value: proxy,
            configurable: true,
            writable: true,
            enumerable: true
          });

          Object.defineProperty(window, 'self', {
            value: proxy,
            configurable: true,
            writable: true,
            enumerable: true
          });
        } catch (e) {
          console.warn('Failed to intercept readonly fetch properties safely:', e);
        }
      })();
    </script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Google AI Studio App</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
